

[build]
base_image=python:3.11-slim
workdir=/app
copy_path=.
install_command=pip install -r requirements.txt

[runtime]
container_name=sanskar-participant-1
container_registry=gcr.io/tantra-ecosystem/sanskar
image_tag=latest
expose_ports=8001,8002,8003

[networking]
network_mode=bridge
dns_servers=8.8.8.8,8.8.4.4

[volumes]
event_store=/app/data/event_store
lineage_data=/app/data/lineage
config=/etc/sanskar

[health_check]
command=curl -f http://localhost:8002/health || exit 1
interval=30s
timeout=5s
retries=3
start_period=10s

[logging]
driver=json-file
max_size=100m
max_file=5

[resource_limits]
memory=2g
cpus=2
