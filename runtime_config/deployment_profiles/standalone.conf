

[binary]
entry_point=sanskar.py
python_version=3.11+
dependencies_file=requirements.txt

[installation]
install_directory=/opt/sanskar
data_directory=/var/lib/sanskar
config_directory=/etc/sanskar
log_directory=/var/log/sanskar
pid_directory=/var/run/sanskar

[systemd_service]
service_name=sanskar-participant
unit_name=sanskar-participant.service
type=simple
user=sanskar
group=sanskar
restart=always
restart_sec=10

[startup]
command=/opt/sanskar/bin/run.sh
working_directory=/opt/sanskar
environment_file=/etc/sanskar/runtime.env
nice=0

[shutdown]
timeout=30
signal=SIGTERM

[firewall]
allow_ports=8001,8002,8003
from_hosts=rajya-service,enforcement-service,bucket-service,insightbridge-service

[monitoring]
systemctl_status_command=systemctl status sanskar-participant
journal_command=journalctl -u sanskar-participant -f
log_file=/var/log/sanskar/sanskar.log

[backup]
backup_paths=/var/lib/sanskar/data,/etc/sanskar/config
backup_frequency=daily
backup_retention=30d

[resources]
memory_max=2g
file_descriptors=65535
open_files_max=65535
