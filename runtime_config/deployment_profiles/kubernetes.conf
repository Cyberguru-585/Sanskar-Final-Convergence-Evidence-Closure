

[cluster]
namespace=tantra-ecosystem
deployment_name=sanskar-participant

[pod_template]
replicas=3
strategy=RollingUpdate
max_surge=1
max_unavailable=0

[container]
image=gcr.io/tantra-ecosystem/sanskar:latest
image_pull_policy=Always
resources_requests_memory=1Gi
resources_requests_cpu=500m
resources_limits_memory=2Gi
resources_limits_cpu=1000m

[ports]
runtime_port=8001
health_port=8002
metrics_port=8003

[probes]
readiness_probe_path=/readiness
readiness_probe_initial_delay=5
readiness_probe_timeout=3
readiness_probe_period=10

liveness_probe_path=/health
liveness_probe_initial_delay=15
liveness_probe_timeout=3
liveness_probe_period=30

[environment]
config_from_file=/etc/sanskar/runtime.env
secrets_mount_path=/var/secrets/sanskar

[storage]
persistence_class=fast-ssd
event_store_size=10Gi
lineage_store_size=5Gi

[networking]
service_type=ClusterIP
service_port=8080
ingress_enabled=true
ingress_class=nginx

[security]
pod_security_policy=restricted
read_only_root_filesystem=true
run_as_non_root=true
run_as_uid=1000

[observability]
prometheus_scrape_enabled=true
prometheus_port=8003
prometheus_interval=30s
